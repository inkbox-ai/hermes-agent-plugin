name: PR checks — lint · unit · contract

on:
  push:
    branches: [main]
  pull_request:                     # catches PRs from feature branches → main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # Offline unit suite + lint. No Hermes host installed → conftest stubs gateway.*
  # and the contract tests auto-skip. Fast signal on our own code — cheap enough to
  # run on every push, including draft PRs (the heavy live suite is what we gate).
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install \
            "inkbox @ git+https://github.com/inkbox-ai/inkbox.git@b2bb11a45c9f4dc89f3bcfbadbd4de5d66d0e9e5#subdirectory=sdk/python" \
            'aiohttp>=3.9' 'segno>=1.5' 'pytest>=8' 'ruff>=0.11.0'

      - name: Lint
        run: .venv/bin/ruff check .

      - name: Run unit tests
        run: .venv/bin/python -m pytest -v

  # Contract suite against the REAL Hermes host at main. This is the lane that
  # catches upstream interface drift (a renamed register_platform kwarg, a moved
  # symbol, a dropped MessageEvent/SendResult field) before it reaches a user.
  # Same suite the canary runs on a schedule; this is the per-PR gate version.
  contract-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install test deps + real Hermes host (main)
        run: |
          uv venv --python 3.12
          uv pip install \
            "inkbox @ git+https://github.com/inkbox-ai/inkbox.git@b2bb11a45c9f4dc89f3bcfbadbd4de5d66d0e9e5#subdirectory=sdk/python" \
            'aiohttp>=3.9' 'segno>=1.5' 'pytest>=8' 'ruff>=0.11.0'
          uv pip install "hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@main"

      - name: Contract tests vs real Hermes main
        run: .venv/bin/pytest --override-ini pythonpath= --import-mode=importlib tests/contract -v
