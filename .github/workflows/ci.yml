name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # inkbox is mocked in the tests, so install only what they import.
      - name: Install test deps
        run: pip install pytest aiohttp

      - name: Test
        run: pytest -q
