name: inkbox
label: Inkbox
kind: platform
version: 0.2.4
description: Inkbox email, SMS/MMS, iMessage, and voice platform plugin for Hermes Agent.
author: Inkbox
requires_env: []
optional_env:
  - name: INKBOX_API_KEY
    description: "Inkbox API key. Agent-scoped keys are recommended."
    prompt: "Inkbox API key"
    secret: true
  - name: INKBOX_IDENTITY
    description: "Inkbox agent identity handle."
    prompt: "Inkbox identity handle"
    secret: false
  - name: INKBOX_SIGNING_KEY
    description: "Webhook signing key for inbound email, SMS, iMessage, and calls."
    prompt: "Inkbox signing key"
    secret: true
  - name: INKBOX_BASE_URL
    description: "Optional Inkbox API base URL override. Defaults to the SDK default."
    prompt: "Inkbox base URL"
    secret: false
  - name: INKBOX_PUBLIC_URL
    description: "Public Hermes gateway URL. Omit to use an Inkbox tunnel."
    prompt: "Public URL"
    secret: false
  - name: INKBOX_TUNNEL_NAME
    description: "Optional Inkbox tunnel name override."
    prompt: "Tunnel name"
    secret: false
  - name: INKBOX_HOME_CHANNEL
    description: "Default Inkbox chat/contact id for cron or notification delivery."
    prompt: "Home channel"
    secret: false
  - name: INKBOX_ALLOWED_USERS
    description: "Comma-separated local allowlist. Usually leave empty and use Inkbox contact rules."
    prompt: "Allowed users"
    secret: false
  - name: INKBOX_ALLOW_ALL_USERS
    description: "Allow all senders admitted by Inkbox contact rules."
    prompt: "Allow all users"
    secret: false
  - name: INKBOX_REALTIME_API_KEY
    description: "Optional OpenAI Realtime API key. OPENAI_API_KEY is also accepted. If omitted, calls use Inkbox STT/TTS."
    prompt: "Realtime API key"
    secret: true
  - name: INKBOX_REALTIME_ENABLED
    description: "Use raw phone media with OpenAI Realtime when credentials exist. Set false to force Inkbox STT/TTS."
    prompt: "Enable Realtime"
    secret: false
  - name: INKBOX_REALTIME_MODEL
    description: "Realtime voice model. Defaults to gpt-realtime-2."
    prompt: "Realtime model"
    secret: false
  - name: INKBOX_REALTIME_VOICE
    description: "Realtime voice name. Defaults to cedar."
    prompt: "Realtime voice"
    secret: false
  - name: INKBOX_REALTIME_CONNECT_TIMEOUT_S
    description: "Seconds to wait for OpenAI Realtime preflight before falling back or failing."
    prompt: "Realtime connect timeout"
    secret: false
  - name: INKBOX_REALTIME_CONSULT_TIMEOUT_S
    description: "Seconds the Realtime voice agent waits for a Hermes consult before continuing."
    prompt: "Realtime consult timeout"
    secret: false
  - name: INKBOX_REALTIME_FALLBACK_TO_INKBOX_STT_TTS
    description: "Fall back to Inkbox STT/TTS if OpenAI Realtime connect/auth fails before call accept."
    prompt: "Realtime fallback"
    secret: false
provides_tools:
  - inkbox_whoami
  - inkbox_lookup_contact
  - inkbox_list_contacts
  - inkbox_get_contact
  - inkbox_create_contact
  - inkbox_update_contact
  - inkbox_delete_contact
  - inkbox_send_email
  - inkbox_send_sms
  - inkbox_list_text_conversations
  - inkbox_get_text_conversation
  - inkbox_list_texts
  - inkbox_get_text
  - inkbox_mark_text_read
  - inkbox_mark_text_conversation_read
  - inkbox_imessage_triage_number
  - inkbox_send_imessage
  - inkbox_list_imessage_assignments
  - inkbox_list_imessage_conversations
  - inkbox_get_imessage_conversation
  - inkbox_send_imessage_reaction
  - inkbox_mark_imessage_conversation_read
  - inkbox_place_call
  - inkbox_a2a_complete
  - inkbox_a2a_ask_caller
  - inkbox_a2a_fail
