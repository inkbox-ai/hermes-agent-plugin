name: Live — agent channels (email + SMS)

# Boots the agent-under-test (AUT) as a real Hermes gateway with the plugin, then a
# remote Inkbox identity emails it and waits for a reply. Two matrix legs:
#   mock — deterministic mock model; proves the pipe (per-PR, free).
#   real — real OpenAI key; proves the agent actually reasons (tokens; manual/weekly).
# Never gates a merge. Ephemeral runner: gateway + mock are torn down when the job ends.
on:
  workflow_dispatch:
    inputs:
      timeout_s:
        description: "Seconds to wait for the reply"
        default: "150"
  schedule:
    - cron: "33 7 * * 1"   # weekly, Monday 07:33 UTC

permissions:
  contents: read

concurrency:
  # Only ONE client may hold the AUT's Inkbox tunnel at a time, so EVERY live tunnel
  # workflow (this + any future one) MUST use this exact group → they run one at a
  # time across all triggers (PRs + the main schedule queue behind each other).
  group: inkbox-live-aut-tunnel
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1          # legs share the AUT identity → must run one at a time
      matrix:
        mode: [mock, real]

    steps:
      - uses: actions/checkout@v4

      - name: Set paths
        run: |
          echo "HERMES_HOME=$GITHUB_WORKSPACE/.hermes" >> "$GITHUB_ENV"
          echo "SPY_FILE=$RUNNER_TEMP/send_spy.jsonl" >> "$GITHUB_ENV"
          echo "GATEWAY_LOG=$RUNNER_TEMP/gateway.log" >> "$GITHUB_ENV"

      - name: Install Hermes (non-interactive)
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash -s -- --non-interactive
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install plugin into the gateway
        run: |
          mkdir -p "$HERMES_HOME/plugins"
          ln -sfn "$GITHUB_WORKSPACE" "$HERMES_HOME/plugins/inkbox"
          hermes plugins enable inkbox
          "$HERMES_HOME/bin/uv" pip install --python "$HERMES_HOME/hermes-agent/venv/bin/python3" \
            'inkbox>=0.4.7' 'aiohttp>=3.9' 'segno>=1.5'

      - name: Configure AUT identity + model (${{ matrix.mode }})
        env:
          HERMES_INKBOX_API_KEY: ${{ secrets.HERMES_INKBOX_API_KEY }}
          HERMES_INKBOX_SIGNING_KEY: ${{ secrets.HERMES_INKBOX_SIGNING_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PY="$HERMES_HOME/hermes-agent/venv/bin/python3"
          HANDLE="$("$PY" - <<'PYEOF'
          import os
          from inkbox import Inkbox
          c = Inkbox(api_key=os.environ["HERMES_INKBOX_API_KEY"], base_url=os.environ.get("INKBOX_BASE_URL", "https://inkbox.ai"))
          print(c.mailboxes.list()[0].email_address.split("@", 1)[0])
          PYEOF
          )"
          echo "AUT handle: $HANDLE"
          {
            echo "INKBOX_API_KEY=$HERMES_INKBOX_API_KEY"
            echo "INKBOX_IDENTITY=$HANDLE"
            echo "INKBOX_SIGNING_KEY=$HERMES_INKBOX_SIGNING_KEY"
            echo "INKBOX_ALLOW_ALL_USERS=true"
          } >> "$HERMES_HOME/.env"
          if [ "${{ matrix.mode }}" = "real" ]; then
            # Real OpenAI: set OPENAI_BASE_URL explicitly so Hermes uses the openai-api
            # provider (and attaches the key) instead of falling back to OpenRouter.
            {
              echo "OPENAI_API_KEY=$OPENAI_API_KEY"
              echo "OPENAI_BASE_URL=https://api.openai.com/v1"
            } >> "$HERMES_HOME/.env"
            # provider=custom + model.base_url sends the model as-is to OpenAI with
            # OPENAI_API_KEY — no known-model alias, no OpenRouter aggregator.
            hermes config set model.provider custom || true
            hermes config set model.base_url https://api.openai.com/v1 || true
            hermes config set model.default gpt-5.5 || true
          else
            {
              echo "OPENAI_API_KEY=sk-mock-not-used"
              echo "OPENAI_BASE_URL=http://127.0.0.1:8088/v1"
            } >> "$HERMES_HOME/.env"
            hermes config set model.provider openai-api || true
            hermes config set model.default mock-model || true
          fi

      - name: Start mock OpenAI model
        if: matrix.mode == 'mock'
        run: |
          nohup "$HERMES_HOME/hermes-agent/venv/bin/python3" \
            "$GITHUB_WORKSPACE/tests/live/mock_openai.py" 8088 > "$RUNNER_TEMP/mock.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/mock.pid"
          for i in $(seq 1 10); do
            curl -sf http://127.0.0.1:8088/v1/models >/dev/null && { echo "mock model ready"; exit 0; }
            sleep 1
          done
          echo "::error::mock model did not start"; cat "$RUNNER_TEMP/mock.log"; exit 1

      - name: Start gateway (with send-spy) and wait for readiness
        run: |
          : > "$SPY_FILE"
          PYTHONPATH="$GITHUB_WORKSPACE/tests/live/spy_path" INKBOX_SPY_FILE="$SPY_FILE" \
            hermes gateway run > "$GATEWAY_LOG" 2>&1 &
          echo $! > "$RUNNER_TEMP/gateway.pid"
          echo "Waiting for the gateway to be ready (tunnel + webhooks)…"
          for i in $(seq 1 36); do      # up to ~180s
            if hermes inkbox doctor 2>/dev/null | grep -q '"ok": true'; then
              echo "Gateway ready."; exit 0
            fi
            sleep 5
          done
          echo "::error::gateway did not become ready"; cat "$GATEWAY_LOG"; exit 1

      - name: Run live test (${{ matrix.mode }})
        env:
          REMOTE_INKBOX_API_KEY: ${{ secrets.REMOTE_INKBOX_API_KEY }}
          HERMES_INKBOX_API_KEY: ${{ secrets.HERMES_INKBOX_API_KEY }}
          INKBOX_SPY_FILE: ${{ runner.temp }}/send_spy.jsonl
          LIVE_EMAIL_TIMEOUT: ${{ github.event.inputs.timeout_s || '150' }}
        run: |
          PY="$HERMES_HOME/hermes-agent/venv/bin/python3"
          "$HERMES_HOME/bin/uv" pip install --python "$PY" pytest pyyaml
          # One email suite; per-test gating selects what runs in each leg.
          if [ "${{ matrix.mode }}" = "real" ]; then
            LIVE_REAL_MODEL=1 "$PY" -m pytest tests/live -v
          else
            "$PY" -m pytest tests/live -v
          fi

      - name: Logs (always)
        if: always()
        run: |
          echo "=== gateway.log ==="; cat "$GATEWAY_LOG" || true
          echo "=== send spy ==="; cat "$SPY_FILE" || true
          echo "=== mock model log ==="; cat "$RUNNER_TEMP/mock.log" 2>/dev/null || true
          echo "=== ~/.hermes/logs ==="; tail -n 200 "$HERMES_HOME"/logs/* 2>/dev/null || true
          kill "$(cat "$RUNNER_TEMP/gateway.pid" 2>/dev/null)" 2>/dev/null || true
          kill "$(cat "$RUNNER_TEMP/mock.pid" 2>/dev/null)" 2>/dev/null || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-logs-${{ matrix.mode }}
          path: |
            ${{ runner.temp }}/gateway.log
            ${{ runner.temp }}/send_spy.jsonl
            ${{ runner.temp }}/mock.log
          if-no-files-found: ignore
