name: Canary — plugin vs Hermes main

# Hermes main moves ~14 commits/day, so it can break us even when we don't push.
# Run the host-interface contract tests against the latest Hermes main twice a day
# and file (or refresh) a single issue when they break. The live channel suite
# chains off this run, so the canary leads and live follows on the same cadence.
on:
  schedule:
    # 2x/day at 8 AM and 8 PM America/Los_Angeles (PDT/UTC-7 basis; cron is UTC).
    - cron: "13 15 * * *"   # 08:00 PT
    - cron: "13 3 * * *"    # 20:00 PT
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install test deps + real Hermes host (main)
        run: |
          uv sync --extra test --python 3.12
          uv pip install "hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@main"

      - name: Contract tests vs real Hermes main
        run: uv run pytest tests/contract -v

      - name: Open/refresh issue on failure
        if: failure()
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          filename: .github/canary-failure.md
          update_existing: true
          search_existing: open
